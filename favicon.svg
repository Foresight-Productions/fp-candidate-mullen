<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Red base (stripes 1,3,5,7,9,11,13) -->
  <rect width="32" height="32" rx="3" fill="#B22234"/>
  <!-- White stripes 2,4,6,8,10,12 -->
  <rect y="2.46"  width="32" height="2.46" fill="#fff"/>
  <rect y="7.38"  width="32" height="2.46" fill="#fff"/>
  <rect y="12.31" width="32" height="2.46" fill="#fff"/>
  <rect y="17.23" width="32" height="2.46" fill="#fff"/>
  <rect y="22.15" width="32" height="2.46" fill="#fff"/>
  <rect y="27.08" width="32" height="2.46" fill="#fff"/>
  <!-- Blue canton -->
  <rect width="13" height="17.23" rx="2" fill="#3C3B6E"/>
  <!-- Stars — 5 rows of 5, 4 rows of 4 (offset), simplified as circles -->
  <g fill="#fff">
    <!-- Row 1: 5 stars at y=1.8 -->
    <circle cx="1.6"  cy="1.8" r="0.9"/>
    <circle cx="4.2"  cy="1.8" r="0.9"/>
    <circle cx="6.8"  cy="1.8" r="0.9"/>
    <circle cx="9.4"  cy="1.8" r="0.9"/>
    <circle cx="12.0" cy="1.8" r="0.9"/>
    <!-- Row 2: 4 stars offset at y=3.7 -->
    <circle cx="2.9"  cy="3.7" r="0.9"/>
    <circle cx="5.5"  cy="3.7" r="0.9"/>
    <circle cx="8.1"  cy="3.7" r="0.9"/>
    <circle cx="10.7" cy="3.7" r="0.9"/>
    <!-- Row 3: 5 stars at y=5.6 -->
    <circle cx="1.6"  cy="5.6" r="0.9"/>
    <circle cx="4.2"  cy="5.6" r="0.9"/>
    <circle cx="6.8"  cy="5.6" r="0.9"/>
    <circle cx="9.4"  cy="5.6" r="0.9"/>
    <circle cx="12.0" cy="5.6" r="0.9"/>
    <!-- Row 4: 4 stars offset at y=7.5 -->
    <circle cx="2.9"  cy="7.5" r="0.9"/>
    <circle cx="5.5"  cy="7.5" r="0.9"/>
    <circle cx="8.1"  cy="7.5" r="0.9"/>
    <circle cx="10.7" cy="7.5" r="0.9"/>
    <!-- Row 5: 5 stars at y=9.4 -->
    <circle cx="1.6"  cy="9.4" r="0.9"/>
    <circle cx="4.2"  cy="9.4" r="0.9"/>
    <circle cx="6.8"  cy="9.4" r="0.9"/>
    <circle cx="9.4"  cy="9.4" r="0.9"/>
    <circle cx="12.0" cy="9.4" r="0.9"/>
    <!-- Row 6: 4 stars offset at y=11.3 -->
    <circle cx="2.9"  cy="11.3" r="0.9"/>
    <circle cx="5.5"  cy="11.3" r="0.9"/>
    <circle cx="8.1"  cy="11.3" r="0.9"/>
    <circle cx="10.7" cy="11.3" r="0.9"/>
    <!-- Row 7: 5 stars at y=13.2 -->
    <circle cx="1.6"  cy="13.2" r="0.9"/>
    <circle cx="4.2"  cy="13.2" r="0.9"/>
    <circle cx="6.8"  cy="13.2" r="0.9"/>
    <circle cx="9.4"  cy="13.2" r="0.9"/>
    <circle cx="12.0" cy="13.2" r="0.9"/>
    <!-- Row 8: 4 stars offset at y=15.1 -->
    <circle cx="2.9"  cy="15.1" r="0.9"/>
    <circle cx="5.5"  cy="15.1" r="0.9"/>
    <circle cx="8.1"  cy="15.1" r="0.9"/>
    <circle cx="10.7" cy="15.1" r="0.9"/>
    <!-- Row 9: 5 stars at y=17.0 -->
    <circle cx="1.6"  cy="17.0" r="0.9"/>
    <circle cx="4.2"  cy="17.0" r="0.9"/>
    <circle cx="6.8"  cy="17.0" r="0.9"/>
    <circle cx="9.4"  cy="17.0" r="0.9"/>
    <circle cx="12.0" cy="17.0" r="0.9"/>
  </g>
</svg>
